image: node:20-alpine
stages:
  - build
  - deploy
build_app:
  stage: build
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 mins


deploy_to_github:
  stage: deploy
  only:
    - main
  script:
    - apk add --no-cache git
    - git config --global user.email "deploy-agent@gitlab.com"
    - git config --global user.name "GitLab IC"
    - npm install
    - npm run build
    - npx gh-pages -d dist --repo https://$GITHUB_TOKEN@github.com/Cozmin-Ghenea/Calendar_Project_FirstBatch.git -m "Deploy [skip ci]"