image: node:20-alpine
stages:
  - build
  - deploy
build_app:
  stage: build
  script:
    - echo "VITE_SUPABASE_URL=$VITE_SUPABASE_URL" > .env
    - echo "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY" >> .env
    - npm install
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 30 mins


deploy_to_github:
  stage: deploy
  only:
    - main
  script:
    - apk add --no-cache git
    # Set up remote with your token
    - git remote add github https://$GITHUB_TOKEN@github.com/Cozmin-Ghenea/Calendar_Project_FirstBatch.git || true
    # Push the current branch to GitHub's main branch
    - git push github HEAD:main --force